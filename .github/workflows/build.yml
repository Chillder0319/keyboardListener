name: Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pystray pillow pynput requests mss
      - run: pyinstaller -w -F --noconsole new.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/new.exe